<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Hub — Student Books & PDFs</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --accent: #10b981;
            --panel-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 1.5rem 2rem;
            background: rgba(30, 41, 59, 0.9);
            border-bottom: 2px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container {
            padding: 2rem;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
            overflow-y: auto;
        }

        .search-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .input-group {
            flex: 1;
            position: relative;
        }

        input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            background: var(--panel-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
        }

        .input-group i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent);
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0 2rem;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        .results-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        .result-card {
            background: var(--panel-bg);
            padding: 1.5rem;
            border-radius: 12px;
            border-left: 4px solid var(--accent);
            transition: transform 0.2s;
        }

        .result-card:hover { transform: translateX(5px); }

        .result-title {
            color: var(--accent);
            font-weight: bold;
            text-decoration: none;
            font-size: 1.1rem;
            display: block;
            margin-bottom: 0.5rem;
        }

        .result-snippet {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .loader {
            display: none;
            text-align: center;
            padding: 2rem;
        }
    </style>
</head>
<body>
    <header>
        <div style="display: flex; align-items: center; gap: 1rem;">
            <i class="fas fa-book-open" style="color: var(--accent); font-size: 1.5rem;"></i>
            <h1 style="margin: 0; font-size: 1.5rem;">Research Hub</h1>
        </div>
        <div style="color: var(--text-secondary);">Student PDF & Knowledge Finder</div>
    </header>

    <div class="container">
        <div class="search-row">
            <div class="input-group">
                <i class="fas fa-search"></i>
                <input type="text" id="search-query" placeholder="Enter topic to find books or papers (e.g. Embedded Systems)...">
            </div>
            <button class="btn" onclick="performSearch()">Find Resources</button>
        </div>

        <div id="loader" class="loader">
            <i class="fas fa-spinner fa-spin fa-2x" style="color: var(--accent);"></i>
            <p>Scanning academic sources...</p>
        </div>

        <div id="results" class="results-grid">
            <!-- Results will appear here -->
        </div>
    </div>

    <script>
        async function performSearch() {
            const query = document.getElementById('search-query').value;
            const loader = document.getElementById('loader');
            const resultsDiv = document.getElementById('results');

            if (!query) return;

            loader.style.display = 'block';
            resultsDiv.innerHTML = '';

            try {
                const response = await fetch('/api/research/search', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({query: query})
                });
                
                const data = await response.json();
                
                if (data.results && data.results.length > 0) {
                    resultsDiv.innerHTML = data.results.map(r => `
                        <div class="result-card">
                            <a href="${r.href}" target="_blank" class="result-title">${r.title}</a>
                            <div class="result-snippet">${r.body || 'No description available.'}</div>
                        </div>
                    `).join('');
                } else {
                    resultsDiv.innerHTML = '<p>No specific PDF resources found. Try a different query.</p>';
                }
            } catch (err) {
                resultsDiv.innerHTML = '<p>Error connecting to search engine.</p>';
            } finally {
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
